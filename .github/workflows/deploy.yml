name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  PROJECT_NAME: spanishgas
  ENVIRONMENT: dev

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy-containers:
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Lambda image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO_LAMBDA: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-lambda
        run: |
          docker build --platform linux/amd64 --provenance=false -f Dockerfile.lambda -t $ECR_REGISTRY/$ECR_REPO_LAMBDA:${{ github.sha }} -t $ECR_REGISTRY/$ECR_REPO_LAMBDA:latest .
          docker push $ECR_REGISTRY/$ECR_REPO_LAMBDA --all-tags

      - name: Build and push Processing image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO_PROCESSING: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-processing
        run: |
          docker build --platform linux/amd64 --provenance=false -f Dockerfile.processing -t $ECR_REGISTRY/$ECR_REPO_PROCESSING:${{ github.sha }} -t $ECR_REGISTRY/$ECR_REPO_PROCESSING:latest .
          docker push $ECR_REGISTRY/$ECR_REPO_PROCESSING --all-tags

      - name: Build and push Streamlit image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO_STREAMLIT: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-streamlit
        run: |
          docker build --platform linux/amd64 --provenance=false -f Dockerfile.streamlit -t $ECR_REGISTRY/$ECR_REPO_STREAMLIT:${{ github.sha }} -t $ECR_REGISTRY/$ECR_REPO_STREAMLIT:latest .
          docker push $ECR_REGISTRY/$ECR_REPO_STREAMLIT --all-tags

      - name: Update Lambda function
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO_LAMBDA: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-pipeline-trigger \
            --image-uri $ECR_REGISTRY/$ECR_REPO_LAMBDA:${{ github.sha }}

      - name: Update Streamlit ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-cluster \
            --service ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-streamlit \
            --force-new-deployment
