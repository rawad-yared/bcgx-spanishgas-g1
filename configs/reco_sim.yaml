paths:
  input_path: data/gold/recommendation_candidates/run_date=2026-02-09/recommendation_candidates.csv
  metrics_output_path: artifacts/reports/offer_simulation_metrics.json
  report_path: artifacts/reports/offer_simulation.md

columns:
  customer_id: customer_id
  segment: segment
  churn_probability: churn_probability
  acceptance_probability: acceptance_probability
  margin: margin_eur
  discount_level: discount_level

assumptions:
  default_acceptance_probability: 0.25
  retention_given_acceptance: 1.0
  discount_is_fraction: true

risk_buckets:
  - name: low
    min: 0.0
    max: 0.33
  - name: medium
    min: 0.33
    max: 0.66
  - name: high
    min: 0.66
    max: 1.0
